services:
  - type: web
    name: AiTestSystem
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: aitestsystem-db
          property: connectionString

databases:
  - name: aitestsystem-db
    plan: free
    databaseName: aitestsystem
